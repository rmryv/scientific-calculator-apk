name: Build Release AAB

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Make gradlew executable (for local use)
        run: chmod +x ./gradlew || true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate Gradle wrapper jar (ensures ./gradlew works)
        run: gradle wrapper --gradle-version 8.10.2 --quiet || true

      - name: Decode Keystore (for release builds)
        if: github.event.inputs.build_type != 'debug'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > app/release-keystore.jks

      - name: Create signing properties (for release)
        if: github.event.inputs.build_type != 'debug'
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          cat > keystore.properties << EOF
          storeFile=app/release-keystore.jks
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          storePassword=$STORE_PASSWORD
          EOF

      - name: Build Release AAB (when secrets available)
        if: github.event.inputs.build_type != 'debug'
        run: ./gradlew bundleRelease --stacktrace || echo "Release build skipped (no keystore secrets configured yet)"

      - name: Build Debug APK (perfect for emulator / simulator testing)
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK (for simulator)
        uses: actions/upload-artifact@v4
        with:
          name: Calculator-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload AAB Artifact (release or debug)
        uses: actions/upload-artifact@v4
        with:
          name: Calculator-bundles-${{ github.sha }}
          path: |
            app/build/outputs/bundle/**/*.aab
          retention-days: 30

      - name: List output files
        run: |
          find app/build/outputs -name "*.aab" -o -name "*.apk" | head -10
